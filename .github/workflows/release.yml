name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Directory.Build.props
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > Directory.Build.props << EOF
          <Project>
            <PropertyGroup>
              <Version>${VERSION}</Version>
              <AssemblyVersion>${VERSION}</AssemblyVersion>
              <FileVersion>${VERSION}</FileVersion>
              <InformationalVersion>${VERSION}</InformationalVersion>
            </PropertyGroup>
          </Project>
          EOF

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish -c Release --no-build -r win-x64 --self-contained -o publish-win-x64

      - name: Publish win-arm64
        run: dotnet publish -c Release --no-build -r win-arm64 --self-contained -o publish-win-arm64

      - name: Publish linux-x64
        run: dotnet publish -c Release --no-build -r linux-x64 --self-contained -o publish-linux-x64

      - name: Zip artifacts
        shell: bash
        run: |
          7z a -tzip SmsNotificationService-win-x64.zip ./publish-win-x64/*
          7z a -tzip SmsNotificationService-win-arm64.zip ./publish-win-arm64/*
          7z a -tzip SmsNotificationService-linux-x64.zip ./publish-linux-x64/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            SmsNotificationService-win-x64.zip
            SmsNotificationService-win-arm64.zip
            SmsNotificationService-linux-x64.zip
