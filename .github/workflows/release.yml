name: Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      cancel-in-progress: false
      group: release-${{ github.ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate Tag
        id: tag_version
        uses: masgeek/github-tag-action@release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          create_annotated_tag: true

      - name: Update Directory.Build.props
        shell: bash
        run: |
          VERSION="${{ steps.tag_version.outputs.version }}"
          echo "<Project>" > Directory.Build.props
          echo "  <PropertyGroup>" >> Directory.Build.props
          echo "    <Version>${VERSION}</Version>" >> Directory.Build.props
          echo "    <AssemblyVersion>${VERSION}</AssemblyVersion>" >> Directory.Build.props
          echo "    <FileVersion>${VERSION}</FileVersion>" >> Directory.Build.props
          echo "    <InformationalVersion>${VERSION}</InformationalVersion>" >> Directory.Build.props
          echo "  </PropertyGroup>" >> Directory.Build.props
          echo "</Project>" >> Directory.Build.props

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish SmsNotificationService.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip artifacts
        shell: bash
        run: 7z a -tzip SmsNotificationService-win-x64.zip "./publish/*"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.tag_version.outputs.version }} installer\installer.iss'

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.16.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Version ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          makeLatest: true
          allowUpdates: true
          generateReleaseNotes: true
          skipIfReleaseExists: false
          artifacts: |
            SmsNotificationService-win-x64.zip
            installer/output/SmsNotificationService-Setup-${{ steps.tag_version.outputs.version }}.exe
