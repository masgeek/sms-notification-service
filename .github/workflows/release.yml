name: Release

on:
  # workflow_run:
  #   workflows: ["Tests"]
  #   types: [completed]
  #   branches: [main]
  push:
    branches:
      - develop
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Generate Version Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.tag_version.outputs.version }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag_version
        uses: masgeek/github-tag-action@release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          create_annotated_tag: true

      - name: Debug tag outputs
        run: |
          echo "=== Tag Action Outputs ==="
          echo "version=${{ steps.tag_version.outputs.version }}"
          echo "new_tag=${{ steps.tag_version.outputs.new_tag }}"
          echo "changelog=${{ steps.tag_version.outputs.changelog }}"
          echo "previous_tag=${{ steps.tag_version.outputs.previous_tag }}"
          echo "=== All Outputs ==="
          echo '${{ toJSON(steps.tag_version.outputs) }}'

  build:
    name: Build and Package
    needs: tag
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          cache: true

      - name: Debug tag outputs
        id: resolve-version
        shell: bash
        run: |
          echo "=== Tag outputs from tag job ==="
          echo "version='${{ needs.tag.outputs.version }}'"
          echo "new_tag='${{ needs.tag.outputs.new_tag }}'"
          echo "=== Resolving version ==="
          VERSION="1.0.0"
          if [ -n "${{ needs.tag.outputs.version }}" ]; then
            VERSION="${{ needs.tag.outputs.version }}"
          elif [ -n "${{ needs.tag.outputs.new_tag }}" ]; then
            VERSION="${{ needs.tag.outputs.new_tag }}"
          else
            GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
            if [ -n "$GIT_TAG" ]; then
              VERSION="$GIT_TAG"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION: $VERSION"

      - name: Update Directory.Build.props
        shell: bash
        run: |
          echo "Writing version: $VERSION"
          echo "<Project>" > Directory.Build.props
          echo "  <PropertyGroup>" >> Directory.Build.props
          echo "    <Version>${VERSION}</Version>" >> Directory.Build.props
          echo "    <AssemblyVersion>${VERSION}</AssemblyVersion>" >> Directory.Build.props
          echo "    <FileVersion>${VERSION}</FileVersion>" >> Directory.Build.props
          echo "    <InformationalVersion>${VERSION}</InformationalVersion>" >> Directory.Build.props
          echo "  </PropertyGroup>" >> Directory.Build.props
          echo "</Project>" >> Directory.Build.props
          cat Directory.Build.props

      - name: Clean intermediate output
        shell: bash
        run: rm -rf **/bin/Release **/obj/Release

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish all
        shell: pwsh
        run: ./publish.ps1

      - name: Publish framework-dependent
        shell: pwsh
        run: ./publish-framework.ps1

      - name: Zip artifacts
        shell: bash
        run: |
          7z a -tzip SmsNotificationService-service-win-x64.zip "./build/service/*"
          7z a -tzip SmsNotificationService-tray-win-x64.zip "./build/tray/*"
          7z a -tzip SmsNotificationService-console-win-x64.zip "./build/console/*"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Building self-contained installer..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "Self-contained installer build failed with exit code $LASTEXITCODE" }
          Write-Host "Building framework-dependent installer..."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\installer-framework.iss"
          if ($LASTEXITCODE -ne 0) { throw "Framework-dependent installer build failed with exit code $LASTEXITCODE" }
          Write-Host "Both installers built successfully."

      - name: Verify version in build
        run: |
          $builtVersion = & build\service\SmsNotificationService.exe --version
          Write-Host "Built version: $builtVersion"
          Write-Host "Expected version: $env:VERSION"
          if ($builtVersion -ne $env:VERSION) {
            Write-Error "Version mismatch! Built: $builtVersion, Expected: $env:VERSION"
            exit 1
          }

      - name: Verify artifacts
        shell: bash
        run: |
          echo "=== Zip artifacts ==="
          ls -la SmsNotificationService-*-win-x64.zip
          echo "=== Installer output ==="
          ls -la installer/output/
          echo "=== Version: $VERSION ==="

      - name: Copy installers to root
        shell: bash
        run: |
          cp installer/output/SmsNotificationService-Setup-*.exe . 2>/dev/null || echo "Self-contained installer not found"
          cp installer/output/SmsNotificationService-Framework-Setup-*.exe . 2>/dev/null || echo "Framework installer not found"
          echo "=== Root directory ==="
          ls -la *.exe 2>/dev/null || echo "No .exe files found"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            SmsNotificationService-*-win-x64.zip
            SmsNotificationService*-Setup-*.exe
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag.outputs.new_tag }}
          name: Version ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          makeLatest: true
          allowUpdates: true
          generateReleaseNotes: true
          skipIfReleaseExists: false
          artifacts: |
            artifacts/SmsNotificationService-service-win-x64.zip
            artifacts/SmsNotificationService-tray-win-x64.zip
            artifacts/SmsNotificationService-console-win-x64.zip
            artifacts/SmsNotificationService-Setup-*.exe
            artifacts/SmsNotificationService-Framework-Setup-*.exe
