name: Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  # push:
  #   branches:
  #     - develop
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.tag_version.outputs.version }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag_version
        uses: masgeek/github-tag-action@release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          create_annotated_tag: true

      - name: Debug tag outputs
        run: |
          echo "=== Tag Action Outputs ==="
          echo "version=${{ steps.tag_version.outputs.version }}"
          echo "new_tag=${{ steps.tag_version.outputs.new_tag }}"
          echo "changelog=${{ steps.tag_version.outputs.changelog }}"
          echo "previous_tag=${{ steps.tag_version.outputs.previous_tag }}"
          echo "=== All Outputs ==="
          echo '${{ toJSON(steps.tag_version.outputs) }}'

  build:
    needs: tag
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Debug tag outputs
        id: resolve-version
        shell: bash
        run: |
          echo "=== Tag outputs from tag job ==="
          echo "version='${{ needs.tag.outputs.version }}'"
          echo "new_tag='${{ needs.tag.outputs.new_tag }}'"
          echo "=== Resolving version ==="
          VERSION="1.0.0"
          if [ -n "${{ needs.tag.outputs.version }}" ]; then
            VERSION="${{ needs.tag.outputs.version }}"
          elif [ -n "${{ needs.tag.outputs.new_tag }}" ]; then
            VERSION="${{ needs.tag.outputs.new_tag }}"
          else
            GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
            if [ -n "$GIT_TAG" ]; then
              VERSION="$GIT_TAG"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION: $VERSION"

      - name: Update Directory.Build.props
        shell: bash
        run: |
          echo "Writing version: $VERSION"
          echo "<Project>" > Directory.Build.props
          echo "  <PropertyGroup>" >> Directory.Build.props
          echo "    <Version>${VERSION}</Version>" >> Directory.Build.props
          echo "    <AssemblyVersion>${VERSION}</AssemblyVersion>" >> Directory.Build.props
          echo "    <FileVersion>${VERSION}</FileVersion>" >> Directory.Build.props
          echo "    <InformationalVersion>${VERSION}</InformationalVersion>" >> Directory.Build.props
          echo "  </PropertyGroup>" >> Directory.Build.props
          echo "</Project>" >> Directory.Build.props
          cat Directory.Build.props

      - name: Clean intermediate output
        shell: bash
        run: rm -rf **/bin/Release **/obj/Release

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish SmsNotificationService.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip artifacts
        shell: bash
        run: 7z a -tzip SmsNotificationService-win-x64.zip "./publish/*"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          Write-Host "ISCC version: $env:VERSION"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "installer\installer.iss"

      - name: Verify version in build
        run: |
          $builtVersion = & publish\SmsNotificationService.exe --version
          Write-Host "Built version: $builtVersion"
          Write-Host "Expected version: $env:VERSION"
          if ($builtVersion -ne $env:VERSION) {
            Write-Error "Version mismatch! Built: $builtVersion, Expected: $env:VERSION"
            exit 1
          }

      - name: Verify artifacts
        shell: bash
        run: |
          echo "=== Build output ==="
          ls -la SmsNotificationService-win-x64.zip
          echo "=== Installer output ==="
          ls -la installer/output/
          echo "=== Version: $VERSION ==="

      - name: Copy installer to root
        shell: bash
        run: cp installer/output/SmsNotificationService-Setup-*.exe .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            SmsNotificationService-win-x64.zip
            SmsNotificationService-Setup-*.exe
          retention-days: 1

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-artifacts
          path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.16.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag.outputs.new_tag }}
          name: Version ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          makeLatest: true
          allowUpdates: true
          generateReleaseNotes: true
          skipIfReleaseExists: false
          artifacts: |
            artifacts/SmsNotificationService-win-x64.zip
            artifacts/SmsNotificationService-Setup-*.exe
