name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Directory.Build.props
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat > Directory.Build.props << EOF
          <Project>
            <PropertyGroup>
              <Version>${VERSION}</Version>
              <AssemblyVersion>${VERSION}</AssemblyVersion>
              <FileVersion>${VERSION}</FileVersion>
              <InformationalVersion>${VERSION}</InformationalVersion>
            </PropertyGroup>
          </Project>
          EOF

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish SmsNotificationService.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip artifacts
        shell: bash
        run: 7z a -tzip SmsNotificationService-win-x64.zip ./publish/*

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\installer.iss

      - name: Verify artifacts exist
        shell: bash
        run: |
          ls -la SmsNotificationService-win-x64.zip
          ls -la installer/output/
          echo "Version: ${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            SmsNotificationService-win-x64.zip
            installer/output/SmsNotificationService-Setup-${{ steps.version.outputs.VERSION }}.exe
