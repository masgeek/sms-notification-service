name: Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [develop]
  push:
    branches:
      - develop
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.tag_version.outputs.version }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Tag
        id: tag_version
        uses: masgeek/github-tag-action@release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
          create_annotated_tag: true

  build:
    needs: tag
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Update Directory.Build.props
        shell: bash
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          echo "<Project>" > Directory.Build.props
          echo "  <PropertyGroup>" >> Directory.Build.props
          echo "    <Version>${VERSION}</Version>" >> Directory.Build.props
          echo "    <AssemblyVersion>${VERSION}</AssemblyVersion>" >> Directory.Build.props
          echo "    <FileVersion>${VERSION}</FileVersion>" >> Directory.Build.props
          echo "    <InformationalVersion>${VERSION}</InformationalVersion>" >> Directory.Build.props
          echo "  </PropertyGroup>" >> Directory.Build.props
          echo "</Project>" >> Directory.Build.props

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish SmsNotificationService.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Zip artifacts
        shell: bash
        run: 7z a -tzip SmsNotificationService-win-x64.zip "./publish/*"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ needs.tag.outputs.version }} installer\installer.iss'

      - name: Verify artifacts
        shell: bash
        run: |
          echo "=== Build output ==="
          ls -la SmsNotificationService-win-x64.zip
          echo "=== Installer output ==="
          ls -la installer/output/
          echo "=== Version ==="
          echo "${{ needs.tag.outputs.version }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            SmsNotificationService-win-x64.zip
            installer/output/
          retention-days: 1

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.16.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.tag.outputs.new_tag }}
          name: Version ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          makeLatest: true
          allowUpdates: true
          generateReleaseNotes: true
          skipIfReleaseExists: false
          artifacts: |
            artifacts/SmsNotificationService-win-x64.zip
            artifacts/SmsNotificationService-Setup-*.exe
