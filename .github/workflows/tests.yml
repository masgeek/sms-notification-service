name: Tests

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  test:
    name: .NET Tests
    runs-on: windows-latest
    timeout-minutes: 15
    concurrency:
      cancel-in-progress: true
      group: test-${{ github.ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Restore test result cache
        id: test-cache
        uses: actions/cache/restore@v6
        with:
          path: .test-passed
          key: test-result-${{ github.sha }}

      - name: Setup .NET SDK
        if: steps.test-cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          cache: true

      - name: Restore NuGet packages
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet restore

      - name: Build solution
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet build -c Release --no-restore

      - name: Check code formatting
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet format SmsNotificationService.slnx --verify-no-changes --verbosity diagnostic

      - name: Run unit tests
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet test -c Release --no-build --verbosity normal --logger "trx;LogFileName=TestResults.trx"

      - name: Upload test results
        if: steps.test-cache.outputs.cache-hit != 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/TestResults.trx"
          retention-days: 7

      - name: Check for vulnerable packages
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

      - name: Create test cache sentinel
        if: steps.test-cache.outputs.cache-hit != 'true' && success()
        run: echo "passed at $(date -u)" > .test-passed

      - name: Save test result cache
        if: steps.test-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v6
        with:
          path: .test-passed
          key: test-result-${{ github.sha }}

  build-tray:
    name: Build Tray App
    runs-on: windows-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          cache: true

      - name: Publish tray app
        run: dotnet publish SmsNotificationService.Tray/SmsNotificationService.Tray.csproj -c Release -r win-x64 --self-contained -o build\tray

      - name: Verify tray app binary
        shell: bash
        run: |
          echo "=== Tray app build output ==="
          ls -la build/tray/SmsNotificationService.Tray.exe 2>/dev/null || echo "Tray app binary not found"
          echo "=== File count ==="
          find build/tray -type f | wc -l

  build-console:
    name: Build Console App
    runs-on: windows-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"
          cache: true

      - name: Publish console app
        run: dotnet publish SmsNotificationService.Console/SmsNotificationService.Console.csproj -c Release -r win-x64 --self-contained -o build\console

      - name: Verify console app binary
        shell: bash
        run: |
          echo "=== Console app build output ==="
          ls -la build/console/SmsNotificationService.Console.exe 2>/dev/null || echo "Console app binary not found"
          echo "=== File count ==="
          find build/console -type f | wc -l

  validate-installer:
    name: Validate Self-Contained Installer
    runs-on: windows-latest
    timeout-minutes: 10
    needs: [build-tray, build-console]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create dummy publish folders
        run: |
          mkdir build\service
          echo placeholder > build\service\SmsNotificationService.exe
          mkdir build\tray
          echo placeholder > build\tray\SmsNotificationService.Tray.exe
          mkdir build\console
          echo placeholder > build\console\SmsNotificationService.Console.exe

      - name: Compile and validate
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.9
        with:
          path: installer/installer.iss

  validate-installer-framework:
    name: Validate Framework-Dependent Installer
    runs-on: windows-latest
    timeout-minutes: 10
    needs: [build-tray, build-console]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create dummy publish folders
        run: |
          mkdir build\service-framework
          echo placeholder > build\service-framework\SmsNotificationService.exe
          mkdir build\tray-framework
          echo placeholder > build\tray-framework\SmsNotificationService.Tray.exe
          mkdir build\console-framework
          echo placeholder > build\console-framework\SmsNotificationService.Console.exe

      - name: Compile and validate
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.9
        with:
          path: installer/installer-framework.iss

  summary:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [test, build-tray, build-console, validate-installer, validate-installer-framework]
    if: always()
    steps:
      - name: Evaluate job results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [ "${{ needs.build-tray.result }}" != "success" ]; then
            echo "::error::Tray app build failed"
            exit 1
          fi
          if [ "${{ needs.build-console.result }}" != "success" ]; then
            echo "::error::Console app build failed"
            exit 1
          fi
          if [ "${{ needs.validate-installer.result }}" != "success" ]; then
            echo "::error::Self-contained installer validation failed"
            exit 1
          fi
          if [ "${{ needs.validate-installer-framework.result }}" != "success" ]; then
            echo "::error::Framework-dependent installer validation failed"
            exit 1
          fi
          echo "All checks passed"
