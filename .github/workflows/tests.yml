name: Tests

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15
    concurrency:
      cancel-in-progress: true
      group: test-${{ github.ref }}

    steps:
      - uses: actions/checkout@v6

      # Skip if this commit already passed tests
      - name: Restore test result cache
        id: test-cache
        uses: actions/cache/restore@v4
        with:
          path: .test-passed
          key: test-result-${{ github.sha }}

      - name: Setup .NET
        if: steps.test-cache.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        if: steps.test-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet restore

      - name: Build
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet build -c Release --no-restore

      - name: Test
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Validate installer script
        run: |
          choco install innosetup -y
          mkdir publish
          echo placeholder > publish\SmsNotificationService.exe
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\installer.iss

      # Save sentinel only after tests pass
      - name: Create test sentinel
        if: steps.test-cache.outputs.cache-hit != 'true' && success()
        run: echo "passed at $(date -u)" > .test-passed

      - name: Save test result cache
        if: steps.test-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .test-passed
          key: test-result-${{ github.sha }}
