name: CI

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    concurrency:
      cancel-in-progress: true
      group: ci-${{ github.ref }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish SmsNotificationService.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmsNotificationService-win-x64
          path: publish/
          retention-days: 7
