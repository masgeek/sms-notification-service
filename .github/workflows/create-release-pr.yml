name: Create Release PR

on:
  push:
    branches:
      - develop
      - ci/pr
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    name: Open PR to Main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for git describe/log below, and recommended by action-pull-request

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh label create release --color "0E8A16" --description "Automated release PR" --force
          gh label create automated --color "5319E7" --description "Created by a workflow" --force
      
      - name: Get latest tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "latest=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update Pull Request
        uses: devops-infra/action-pull-request@v1.2.5
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          source_branch: develop
          target_branch: main
          title: "Release: develop → main"
          body: |
            ## Automated Release PR

            **Source:** `develop` → `main`
            **Last tag:** `${{ steps.tag.outputs.latest }}`

            ---
            > Merge this PR to trigger the release workflow.
          label: release,automated
          get_diff: true          # appends commit list + changed files automatically
          allow_no_diff: false    # don't open/keep a PR if develop == main